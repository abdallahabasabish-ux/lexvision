<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>استعادة كلمة المرور - مكتب المحاماة</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); padding: 2rem 1rem; }
    .auth-card { width: 100%; max-width: 440px; background: var(--white); border-radius: var(--radius-xl); padding: 2.5rem 2rem; box-shadow: var(--shadow-xl); }
    .auth-logo { text-align: center; margin-bottom: 2rem; }
    .auth-logo img { height: 60px; margin-bottom: 0.5rem; }
    .auth-logo h1 { font-size: 1.5rem; font-weight: 800; color: var(--primary); }
    .auth-logo p { color: var(--gray-500); font-size: 0.9rem; }
    .form-group { margin-bottom: 1.25rem; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 0.3rem; font-size: 0.9rem; }
    .form-group .input-wrapper { position: relative; }
    .form-group .input-wrapper i { position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); color: var(--gray-400); }
    .form-group input { width: 100%; padding: 0.75rem 1rem 0.75rem 2.8rem; border: 2px solid var(--gray-200); border-radius: 0.75rem; font-family: inherit; font-size: 0.95rem; transition: var(--transition); }
    .form-group input:focus { outline: none; border-color: var(--secondary); box-shadow: 0 0 0 4px rgba(189,157,96,0.15); }
    .btn-auth { width: 100%; padding: 0.85rem; border: none; border-radius: 0.75rem; background: var(--secondary); color: var(--white); font-size: 1rem; font-weight: 700; cursor: pointer; transition: var(--transition); font-family: inherit; }
    .btn-auth:hover { background: var(--secondary-light); transform: translateY(-2px); box-shadow: 0 10px 30px rgba(189,157,96,0.3); }
    .btn-auth:disabled { opacity: 0.6; cursor: not-allowed; }
    .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--gray-500); }
    .auth-footer a { color: var(--secondary); font-weight: 600; }
    .auth-footer a:hover { text-decoration: underline; }
    .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: var(--primary); color: var(--white); padding: 0.75rem 2rem; border-radius: 0.75rem; box-shadow: var(--shadow-medium); font-weight: 600; z-index: 9999; opacity: 0; transition: opacity 0.3s ease; pointer-events: none; }
    .toast.show { opacity: 1; }
    .toast.success { background: var(--success); }
    .toast.error { background: var(--danger); }
    .info-text { font-size: 0.9rem; color: var(--gray-600); margin-bottom: 1.5rem; text-align: center; }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card" data-aos="fade-up">
      <div class="auth-logo">
        <img src="assets/images/logo.svg" alt="شعار المكتب" />
        <h1>استعادة كلمة المرور</h1>
        <p>سندخل بريدك الإلكتروني لإرسال رابط إعادة التعيين</p>
      </div>

      <div class="info-text">
        <i class="fas fa-info-circle" style="color: var(--secondary);"></i>
        ستتلقى رابطاً على بريدك الإلكتروني لإعادة تعيين كلمة المرور.
      </div>

      <form id="forgotForm" novalidate>
        <div class="form-group">
          <label for="resetEmail">البريد الإلكتروني</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope"></i>
            <input type="email" id="resetEmail" placeholder="example@domain.com" required />
          </div>
          <div class="error-message" id="resetEmailError" style="color:var(--danger);font-size:0.85rem;margin-top:0.3rem;display:none;">يرجى إدخال بريد إلكتروني صحيح</div>
        </div>

        <button type="submit" class="btn-auth" id="resetBtn">
          <span id="resetText">إرسال رابط الاستعادة</span>
          <i class="fas fa-spinner fa-spin" id="resetSpinner" style="display:none;"></i>
        </button>
      </form>

      <div class="auth-footer">
        تذكرت كلمة المرور؟ <a href="login.html">تسجيل الدخول</a>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="assets/js/firebase-config.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    AOS.init({ duration: 800, once: true });
  </script>
</body>
</html>
